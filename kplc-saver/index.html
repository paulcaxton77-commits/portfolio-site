<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPLC Saver Pro | Smart Estimator</title>
    <link rel="stylesheet" href="style.css"> </head>
<body style="background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background: #1e1e1e; padding: 30px; border-radius: 15px; border-top: 5px solid #e67e22; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 style="color: #e67e22; margin-top: 0;">KPLC Saver Pro</h2>
        <p style="font-size: 0.9em; color: #aaa;">Enter amount to see your estimated units.</p>
        
        <label style="display: block; margin-bottom: 10px;">Amount (KES):</label>
        <input type="number" id="kes-amount" placeholder="e.g. 1000" style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box;">

        <button onclick="calculateAdvancedKPLC()" style="width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 8px; background: #e67e22; color: white; font-weight: bold; cursor: pointer;">Calculate Units</button>
        
        <div id="kplc-result" style="margin-top: 20px; padding: 15px; border-radius: 8px; background: #252525; min-height: 50px; text-align: center;">
            Results will appear here...
        </div>

        <a href="../index.html" style="display: block; text-align: center; margin-top: 20px; color: #60a5fa; text-decoration: none; font-size: 0.8em;">← Back to Portfolio</a>
    </div>

    <script src="script.js"></script> </body>
</html>
